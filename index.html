<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apology Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Floating Hearts Container -->
  <div class="hearts-container"></div>

  <!-- Main Message -->
  <div class="content">
    <h1>My Dearest Love</h1>
    <p>I’m truly sorry, and I hope you can forgive me 💙</p>
    <button id="showVideo">Swipe to See</button>

    <!-- Video hidden by default -->
    <video id="apologyVideo" width="400" controls style="display:none;">
      <source src="video.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <!-- Background music -->
  <audio id="bgMusic" loop>
    <source src="blue.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
